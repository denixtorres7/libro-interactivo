<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Libro Sensorial</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  background:white;
  touch-action:none;
  user-select:none;
  font-family:Arial, Helvetica, sans-serif;
}

#libro{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:white;
}

#fondo{
  position:absolute;
  inset:0;
  background:white;
  transition:background 0.6s ease, filter 0.6s ease;
}

#camara{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  z-index:0;
  transform:scaleX(-1);
  transition:opacity 0.6s ease;
}

#capaPuntos{
  position:absolute;
  inset:0;
  z-index:5;
}

#oscuro{
  position:absolute;
  inset:0;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
  z-index:8;
}

#mensaje{
  position:absolute;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  font-size:clamp(18px,4vw,28px);
  text-align:center;
  width:90vw;
  color:black;
  line-height:1.25;
}

.punto{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  will-change:left,top,transform;
}

.amarillo{ background:#ffd000; }
.rojo{ background:#ff4040; }
.azul{ background:#40bfff; }

.palpita{
  animation:palpita 0.6s infinite alternate;
}

@keyframes palpita{
  from{
    transform:translate(-50%,-50%) scale(1);
  }

  to{
    transform:translate(-50%,-50%) scale(1.3);
  }
}

.explota{
  animation:explota 1s forwards ease-out;
}

@keyframes explota{
  from{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
  }

  to{
    transform:translate(-50%,-50%) scale(18);
    opacity:0;
  }
}

#inicio{
  position:absolute;
  inset:0;
  background:white;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
}

button{
  padding:18px 28px;
  border:none;
  border-radius:999px;
  background:black;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="libro">

<div id="fondo"></div>

<video id="camara" autoplay playsinline muted></video>

<div id="capaPuntos"></div>

<div id="oscuro"></div>

<div id="mensaje"></div>

<div id="inicio">
<h1>Libro Sensorial</h1>
<button id="btnInicio">Iniciar</button>
</div>

</div>

<script>

const fondo = document.getElementById("fondo");
const capaPuntos = document.getElementById("capaPuntos");
const oscuro = document.getElementById("oscuro");
const mensaje = document.getElementById("mensaje");
const inicio = document.getElementById("inicio");
const btnInicio = document.getElementById("btnInicio");
const camara = document.getElementById("camara");

let objetos = [];
let paginaActual = 0;

let audioContext = null;

let orientacion = {
  alpha:0,
  beta:0,
  gamma:0
};

let puntero = {
  x:0,
  y:0,
  activo:false
};

let ultimoShake = 0;
let ultimoCambioPagina = 0;
let ultimoSoplo = 0;

let analizadorAudio = null;
let datosAudio = null;

let camaraActiva = false;

function crearPuntosIniciales(cantidad){

  const colores = ["amarillo","rojo","azul"];

  let lista = [];

  for(let i=0;i<cantidad;i++){

    lista.push({
      color:colores[i%3],
      x:20 + Math.random()*60,
      y:20 + Math.random()*60
    });

  }

  return lista;
}

const paginas = [
  { 
    tipo: "normal",
    mensaje: "Toca el punto. Está vivo.",
    puntos: [
      { color: "amarillo", x: 50, y: 55 }
    ]
  },

  { 
    tipo: "arrastre",
    mensaje: "Arrastra los puntos con el dedo.",
    puntos: [
      { color: "amarillo", x: 32, y: 55 },
      { color: "rojo", x: 50, y: 55 },
      { color: "azul", x: 68, y: 55 }
    ]
  },

  { 
    tipo: "normal",
    mensaje: "Inclina el celular.",
    puntos: [
      { color: "amarillo", x: 28, y: 45 },
      { color: "rojo", x: 50, y: 45 },
      { color: "azul", x: 72, y: 45 }
    ]
  },

  { 
    tipo: "explosionOscura",
    mensaje: "Agita fuerte. Después, mantén presionado el punto amarillo.",
    puntos: [
      { color: "amarillo", x: 35, y: 45 },
      { color: "rojo", x: 48, y: 45 },
      { color: "azul", x: 61, y: 45 },
      { color: "amarillo", x: 43, y: 58 },
      { color: "rojo", x: 56, y: 58 }
    ]
  },

  { 
    tipo: "brujula",
    mensaje: "Gira el celular.",
    puntos: crearPuntosIniciales(21)
  },

  { 
    tipo: "luz",
    mensaje: "Ilumina o tapa el celular. Si no funciona, desliza arriba/abajo.",
    puntos: crearPuntosIniciales(16)
  },

  { 
    tipo: "miedo",
    mensaje: "Acerca el dedo.",
    puntos: crearPuntosIniciales(14)
  },

  { 
    tipo: "curiosidad",
    mensaje: "Mueve el dedo despacio por la pantalla.",
    puntos: crearPuntosIniciales(12)
  },

  { 
    tipo: "salto",
    mensaje: "Mantén presionado un punto. Ahora, ¡Suéltalo!",
    puntos: crearPuntosIniciales(8)
  },

  { 
    tipo: "cadena",
    mensaje: "Haz saltar un punto.",
    puntos: crearPuntosIniciales(10)
  },

  { 
    tipo: "explotaPresion",
    mensaje: "Mantén presionada la pantalla un tiempo. Los puntos no resistirán.",
    puntos: crearPuntosIniciales(10)
  },

  { 
    tipo: "ruido",
    mensaje: "Aplaude o haz ruido.",
    puntos: crearPuntosIniciales(15)
  },

  { 
    tipo: "respiracion",
    mensaje: "Sopla suave. Ahora, ¡Sopla fuerte!",
    puntos: crearPuntosIniciales(18)
  },

  { 
    tipo: "galaxia",
    mensaje: "Agita el celular y verás las estrellas.",
    puntos: crearPuntosIniciales(28)
  },

  { 
    tipo: "camara",
    mensaje: "Toca la pantalla para activar cámara. Ahora, ¡Muévete!",
    puntos: crearPuntosIniciales(18)
  }
];

function iniciarAudio(){

  if(!audioContext){
    audioContext = new(window.AudioContext || window.webkitAudioContext)();
  }

}

function sonido(tipo="pop"){

  if(!audioContext) return;

  const t = audioContext.currentTime;

  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();

  osc.connect(gain);
  gain.connect(audioContext.destination);

  if(tipo==="pop"){
    osc.frequency.value = 420;
    gain.gain.value = 0.18;
  }

  if(tipo==="rebote"){
    osc.frequency.value = 220;
    gain.gain.value = 0.14;
  }

  if(tipo==="explosion"){
    osc.frequency.value = 90;
    gain.gain.value = 0.45;
  }

  gain.gain.exponentialRampToValueAtTime(0.001,t+0.25);

  osc.start(t);
  osc.stop(t+0.25);

}

function cargarPagina(i){

  paginaActual = i;

  const pagina = paginas[paginaActual];

  mensaje.innerText = pagina.mensaje;

  capaPuntos.innerHTML = "";

  objetos = [];

  oscuro.style.opacity = 0;

  pagina.puntos.forEach(p=>crearPunto(p));

}

function crearPunto(data){

  const el = document.createElement("div");

  el.className = `punto ${data.color}`;

  capaPuntos.appendChild(el);

  const obj = {
    el,
    x:window.innerWidth * data.x /100,
    y:window.innerHeight * data.y /100,
    vx:0,
    vy:0,
    color:data.color,
    presionando:false,
    inicio:0
  };

  el.addEventListener("pointerdown",()=>{

    obj.presionando = true;
    obj.inicio = Date.now();

    el.classList.add("palpita");

  });

  el.addEventListener("pointerup",()=>{

    el.classList.remove("palpita");

    const tiempo = Date.now() - obj.inicio;

    obj.presionando = false;

    if(paginas[paginaActual].tipo==="salto"){

      obj.vy -= Math.min(25, 8 + tiempo/80);

      sonido("pop");

    }

    if(paginas[paginaActual].tipo==="cadena"){

      objetos.forEach((o,i)=>{

        setTimeout(()=>{
          o.vy -= 14;
        },i*120);

      });

      sonido("pop");

    }

    if(paginas[paginaActual].tipo==="explotaPresion"){

      if(tiempo>1400){

        el.classList.add("explota");

        sonido("explosion");

      }

    }

  });

  objetos.push(obj);

}

function animar(){

  const tipo = paginas[paginaActual].tipo;

  if(tipo==="miedo"){

    objetos.forEach(p=>{

      const dx = p.x - puntero.x;
      const dy = p.y - puntero.y;

      const d = Math.sqrt(dx*dx + dy*dy);

      if(d<180){

        p.vx += dx/d;
        p.vy += dy/d;

      }

    });

  }

  if(tipo==="curiosidad"){

    objetos.forEach(p=>{

      p.vx += (puntero.x - p.x)*0.003;
      p.vy += (puntero.y - p.y)*0.003;

    });

  }

  if(tipo==="brujula"){

    const paleta = ["#00bbf9","#4361ee","#7209b7"];

    const angulo = ((360 - orientacion.alpha)*Math.PI)/180;

    const cx = window.innerWidth/2;
    const cy = window.innerHeight/2;

    objetos.forEach((p,i)=>{

      const fila = Math.floor(i/3);

      const lateral = (i%3 -1)*40;

      const lx = lateral;
      const ly = fila*40 - 180;

      const tx = cx + lx*Math.cos(angulo) - ly*Math.sin(angulo);

      const ty = cy + lx*Math.sin(angulo) + ly*Math.cos(angulo);

      p.vx += (tx-p.x)*0.02;
      p.vy += (ty-p.y)*0.02;

      p.el.style.background = paleta[i%3];

    });

  }

  objetos.forEach(p=>{

    if(!p.presionando){

      p.vy += 0.08;

      p.x += p.vx;
      p.y += p.vy;

      p.vx *= 0.95;
      p.vy *= 0.95;

    }

    if(p.x<30 || p.x>window.innerWidth-30){

      p.vx *= -0.7;

      sonido("rebote");

    }

    if(p.y<30 || p.y>window.innerHeight-30){

      p.vy *= -0.7;

      sonido("rebote");

    }

    p.el.style.left = p.x+"px";
    p.el.style.top = p.y+"px";

  });

  requestAnimationFrame(animar);

}

window.addEventListener("pointermove",e=>{

  puntero.x = e.clientX;
  puntero.y = e.clientY;
  puntero.activo = true;

});

window.addEventListener("deviceorientation",e=>{

  orientacion.alpha = e.alpha || 0;
  orientacion.beta = e.beta || 0;
  orientacion.gamma = e.gamma || 0;

  if(["normal","arrastre"].includes(paginas[paginaActual].tipo)){

    objetos.forEach(p=>{

      p.vx += orientacion.gamma*0.015;
      p.vy += orientacion.beta*0.008;

    });

  }

});

window.addEventListener("devicemotion",e=>{

  const acc = e.accelerationIncludingGravity;

  if(!acc) return;

  const fuerza =
    Math.abs(acc.x)+
    Math.abs(acc.y)+
    Math.abs(acc.z);

  const ahora = Date.now();

  if(fuerza>35 && ahora-ultimoShake>900){

    ultimoShake = ahora;

    if(paginas[paginaActual].tipo==="explosionOscura"){

      objetos.forEach(p=>{

        p.el.classList.add("explota");

      });

      sonido("explosion");

      setTimeout(()=>{

        oscuro.style.opacity = 1;

        capaPuntos.innerHTML = "";

        objetos=[];

        crearPunto({
          color:"amarillo",
          x:50,
          y:38
        });

      },1000);

      return;

    }

    if(paginas[paginaActual].tipo==="galaxia"){

      objetos.forEach(p=>{

        p.vx += (Math.random()-0.5)*30;
        p.vy += (Math.random()-0.5)*30;

        p.el.style.width = "14px";
        p.el.style.height = "14px";

      });

    }

    objetos.forEach(p=>{

      p.vx += (Math.random()-0.5)*20;
      p.vy += (Math.random()-0.5)*20;

    });

  }

});

async function activarMicrofono(){

  const stream = await navigator.mediaDevices.getUserMedia({
    audio:true
  });

  const fuente = audioContext.createMediaStreamSource(stream);

  analizadorAudio = audioContext.createAnalyser();

  fuente.connect(analizadorAudio);

  datosAudio = new Uint8Array(analizadorAudio.frequencyBinCount);

  detectarAudio();

}

function detectarAudio(){

  analizadorAudio.getByteFrequencyData(datosAudio);

  let volumen = 0;

  for(let i=0;i<datosAudio.length;i++){

    volumen += datosAudio[i];

  }

  volumen /= datosAudio.length;

  const tipo = paginas[paginaActual].tipo;

  if(volumen>25){

    if(tipo==="respiracion"){

      objetos.forEach(p=>{

        p.vx += (Math.random()-0.5)*(volumen>45?18:4);
        p.vy -= volumen>45?10:3;

      });

    }

    if(tipo==="ruido"){

      objetos.forEach(p=>{

        p.vx += (Math.random()-0.5)*12;
        p.vy += (Math.random()-0.5)*12;

      });

    }

  }

  requestAnimationFrame(detectarAudio);

}

async function activarCamara(){

  if(camaraActiva) return;

  const stream = await navigator.mediaDevices.getUserMedia({
    video:true
  });

  camara.srcObject = stream;

  camara.style.opacity = 0.35;

  camaraActiva = true;

}

capaPuntos.addEventListener("dblclick",()=>{

  cargarPagina((paginaActual+1)%paginas.length);

});

window.addEventListener("pointerdown",()=>{

  if(paginas[paginaActual].tipo==="camara"){

    activarCamara();

  }

});

btnInicio.addEventListener("click",async()=>{

  inicio.style.display = "none";

  iniciarAudio();

  if(typeof DeviceMotionEvent !== "undefined" &&
     typeof DeviceMotionEvent.requestPermission === "function"){

     await DeviceMotionEvent.requestPermission();

  }

  if(typeof DeviceOrientationEvent !== "undefined" &&
     typeof DeviceOrientationEvent.requestPermission === "function"){

     await DeviceOrientationEvent.requestPermission();

  }

  await activarMicrofono();

  cargarPagina(0);

  animar();

});

</script>

</body>
</html>
