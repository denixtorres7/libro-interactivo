<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Libro interactivo de puntitos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
    }

    #libro {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: white;
    }

    #paginaFondo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
      pointer-events: none;
      background: white;
    }

    #capaPuntos {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: auto;
    }

    .punto {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      will-change: left, top, transform;
      box-shadow: 0 5px 12px rgba(0,0,0,0.18);
    }

    .amarillo { background: #ffd51e; }
    .rojo { background: #ef3d35; }
    .azul { background: #45bde8; }
    .blanco { background: #ffffff; border: 2px solid #ddd; }

    #panelInicio {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: rgba(255,255,255,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    #panelInicio button {
      border: none;
      background: #111;
      color: white;
      font-size: 20px;
      border-radius: 999px;
      padding: 16px 26px;
      cursor: pointer;
    }

    #mensaje {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.82);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      color: #222;
      pointer-events: none;
    }

    #capaOscura {
      position: absolute;
      inset: 0;
      background: black;
      opacity: 0;
      z-index: 8;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .punto.explota {
      animation: explotarPunto 1.1s ease-out forwards;
    }

    @keyframes explotarPunto {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(8); opacity: 0.95; }
      100% { transform: translate(-50%, -50%) scale(20); opacity: 0.9; }
    }
  </style>
</head>
<body>
  <main id="libro">
    <img id="paginaFondo" src="paginas/pagina01.png" alt="Página del libro" />
    <div id="capaPuntos"></div>
    <div id="capaOscura"></div>

    <div id="mensaje">Toca iniciar</div>

    <section id="panelInicio">
      <div>
        <h1>Libro interactivo</h1>
        <p>Toca para activar sonido, movimiento y sensores del celular.</p>
        <button id="btnIniciar">Iniciar experiencia</button>
      </div>
    </section>
  </main>

  <!-- Los sonidos se generan con Web Audio para que no dependan de archivos mp3 externos. -->

  <script>
    const paginaFondo = document.getElementById("paginaFondo");
    const capaPuntos = document.getElementById("capaPuntos");
    const mensaje = document.getElementById("mensaje");
    const capaOscura = document.getElementById("capaOscura");
    const panelInicio = document.getElementById("panelInicio");
    const btnIniciar = document.getElementById("btnIniciar");

    let audioContext = null;

    function iniciarAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    let paginaActual = 0;
    let objetos = [];
    let ultimoShake = 0;
    let sensoresActivos = false;
    let microfonoActivo = false;
    let analizadorAudio = null;
    let datosAudio = null;
    let ultimoSoplo = 0;

    // Evita que los sonidos se repitan cuando el punto ya está casi quieto.
    const VELOCIDAD_MINIMA_SONIDO = 4.5;
    const VELOCIDAD_REPOSO = 0.35;
    const TIEMPO_ENTRE_CAMBIO_PAGINA = 1200;
    let ultimoCambioPagina = 0;
    let explosionRealizada = false;
    let nivelOscuridad = 0;
    let inicioToqueY = null;

    const paginas = [
      {
        fondo: "paginas/pagina01.png",
        mensaje: "Toca los puntos.",
        tipo: "normal",
        puntos: [
          { color: "amarillo", x: 50, y: 52 },
        ]
      },
      {
        fondo: "paginas/pagina02.png",
        mensaje: "Inclina el celular y los puntos caerán.",
        tipo: "normal",
        puntos: [
          { color: "amarillo", x: 38, y: 48 },
          { color: "rojo", x: 50, y: 48 },
          { color: "azul", x: 62, y: 48 },
        ]
      },
      {
        fondo: "paginas/pagina03.png",
        mensaje: "Agita el celular para desordenarlos.",
        tipo: "normal",
        puntos: [
          { color: "amarillo", x: 35, y: 45 },
          { color: "amarillo", x: 50, y: 45 },
          { color: "amarillo", x: 65, y: 45 },
          { color: "rojo", x: 43, y: 58 },
          { color: "azul", x: 57, y: 58 },
        ]
      },
      {
        fondo: "paginas/pagina04.png",
        mensaje: "Agita fuerte: los puntos explotarán. Luego desliza hacia arriba para iluminar.",
        tipo: "explosionOscura",
        puntos: [
          { color: "amarillo", x: 35, y: 45 },
          { color: "rojo", x: 48, y: 45 },
          { color: "azul", x: 61, y: 45 },
          { color: "amarillo", x: 43, y: 58 },
          { color: "rojo", x: 56, y: 58 },
        ]
      }
    ];

    function reproducir(tipo = "pop") {
      if (!audioContext) return;

      const t = audioContext.currentTime;
      const duracion = tipo === "caida" ? 0.08 : 0.05;

      // Sonido tipo golpe suave usando ruido, no tono musical.
      const bufferSize = audioContext.sampleRate * duracion;
      const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        const fade = 1 - i / bufferSize;
        data[i] = (Math.random() * 2 - 1) * fade * fade;
      }

      const noise = audioContext.createBufferSource();
      noise.buffer = buffer;

      const filtro = audioContext.createBiquadFilter();
      filtro.type = "lowpass";

      const gain = audioContext.createGain();

      if (tipo === "pop") {
        filtro.frequency.setValueAtTime(900, t);
        gain.gain.setValueAtTime(0.08, t);
      }

      if (tipo === "rebote") {
        filtro.frequency.setValueAtTime(550, t);
        gain.gain.setValueAtTime(0.055, t);
      }

      if (tipo === "caida") {
        filtro.frequency.setValueAtTime(260, t);
        gain.gain.setValueAtTime(0.06, t);
      }

      gain.gain.exponentialRampToValueAtTime(0.001, t + duracion);

      noise.connect(filtro);
      filtro.connect(gain);
      gain.connect(audioContext.destination);

      noise.start(t);
      noise.stop(t + duracion);
    }

    function cargarPagina(indice) {
      paginaActual = indice;
      const pagina = paginas[paginaActual];
      paginaFondo.src = pagina.fondo;
      mensaje.textContent = pagina.mensaje;
      capaPuntos.innerHTML = "";
      objetos = [];
      explosionRealizada = false;
      nivelOscuridad = 0;
      capaOscura.style.opacity = 0;

      pagina.puntos.forEach(p => crearPunto(p.color, p.x, p.y));
    }

    function crearPunto(color, xPorcentaje, yPorcentaje) {
      const el = document.createElement("div");
      el.className = `punto ${color}`;
      capaPuntos.appendChild(el);

      const objeto = {
        el,
        x: (window.innerWidth * xPorcentaje) / 100,
        y: (window.innerHeight * yPorcentaje) / 100,
        vx: 0,
        vy: 0,
        radio: 32,
        ultimoSonido: 0,
        arrastrando: false,
        ultimoX: 0,
        ultimoY: 0,
        ultimoTiempo: 0
      };

      el.addEventListener("pointerdown", (e) => {
        objeto.arrastrando = true;
        objeto.ultimoX = e.clientX;
        objeto.ultimoY = e.clientY;
        objeto.ultimoTiempo = Date.now();
        objeto.vx = 0;
        objeto.vy = 0;
        el.setPointerCapture(e.pointerId);
        reproducir("pop");
        if (navigator.vibrate) navigator.vibrate(35);
      });

      el.addEventListener("pointermove", (e) => {
        if (!objeto.arrastrando) return;

        const ahora = Date.now();
        const dt = Math.max(16, ahora - objeto.ultimoTiempo);

        objeto.vx = (e.clientX - objeto.ultimoX) / dt * 16;
        objeto.vy = (e.clientY - objeto.ultimoY) / dt * 16;

        objeto.x = e.clientX;
        objeto.y = e.clientY;

        objeto.ultimoX = e.clientX;
        objeto.ultimoY = e.clientY;
        objeto.ultimoTiempo = ahora;
      });

      el.addEventListener("pointerup", (e) => {
        objeto.arrastrando = false;
        el.releasePointerCapture(e.pointerId);
        reproducir("rebote");
      });

      el.addEventListener("pointercancel", () => {
        objeto.arrastrando = false;
      });

      objetos.push(objeto);
    }

    function animar() {
      objetos.forEach(p => {
        if (p.arrastrando) {
          p.el.style.left = `${p.x}px`;
          p.el.style.top = `${p.y}px`;
          return;
        }

        p.vy += 0.08;
        p.x += p.vx;
        p.y += p.vy;

        p.vx *= 0.94;
        p.vy *= 0.94;

        const minX = p.radio;
        const maxX = window.innerWidth - p.radio;
        const minY = p.radio;
        const maxY = window.innerHeight - p.radio;

        if (p.x < minX) {
          const impacto = Math.abs(p.vx);
          p.x = minX;
          p.vx *= -0.55;
          sonarImpacto(p, impacto, "rebote");
        }

        if (p.x > maxX) {
          const impacto = Math.abs(p.vx);
          p.x = maxX;
          p.vx *= -0.55;
          sonarImpacto(p, impacto, "rebote");
        }

        if (p.y < minY) {
          const impacto = Math.abs(p.vy);
          p.y = minY;
          p.vy *= -0.55;
          sonarImpacto(p, impacto, "rebote");
        }

        if (p.y > maxY) {
          const impacto = Math.abs(p.vy);
          p.y = maxY;

          if (impacto < VELOCIDAD_MINIMA_SONIDO) {
            // Cuando ya casi no se mueve, lo dejamos dormido sobre el piso.
            p.vy = 0;
            p.vx *= 0.82;
          } else {
            p.vy *= -0.45;
            sonarImpacto(p, impacto, "caida");
          }
        }

        // Si queda casi quieto, se apaga del todo para evitar microrebotes sonoros.
        if (Math.abs(p.vx) < VELOCIDAD_REPOSO) p.vx = 0;
        if (Math.abs(p.vy) < VELOCIDAD_REPOSO) p.vy = 0;

        // Si está en el piso y ya no tiene fuerza, queda dormido.
        if (p.y >= maxY - 1 && Math.abs(p.vx) < VELOCIDAD_REPOSO * 2 && Math.abs(p.vy) < VELOCIDAD_REPOSO * 2) {
          p.y = maxY;
          p.vx = 0;
          p.vy = 0;
        }

        p.el.style.left = `${p.x}px`;
        p.el.style.top = `${p.y}px`;
      });

      requestAnimationFrame(animar);
    }

    function sonarImpacto(punto, impacto, tipo) {
      const ahora = Date.now();

      // Solo suena si el golpe fue suficientemente fuerte.
      if (impacto < VELOCIDAD_MINIMA_SONIDO) return;

      // Cada punto tiene su propio descanso sonoro.
      if (ahora - punto.ultimoSonido < 220) return;

      punto.ultimoSonido = ahora;
      reproducir(tipo);
    }

    function siguientePagina() {
      const ahora = Date.now();
      if (ahora - ultimoCambioPagina < TIEMPO_ENTRE_CAMBIO_PAGINA) return;

      ultimoCambioPagina = ahora;
      const nuevaPagina = (paginaActual + 1) % paginas.length;
      cargarPagina(nuevaPagina);
      reproducir("pop");
    }

    capaPuntos.addEventListener("dblclick", siguientePagina);

    window.addEventListener("deviceorientation", e => {
      if (!sensoresActivos) return;
      const gamma = e.gamma || 0;
      const beta = e.beta || 0;

      objetos.forEach(p => {
        p.vx += gamma * 0.012;
        p.vy += beta * 0.006;
      });
    });

    window.addEventListener("devicemotion", e => {
      if (!sensoresActivos) return;
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;

      const fuerza = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
      const ahora = Date.now();

      if (fuerza > 35 && ahora - ultimoShake > 900) {
        ultimoShake = ahora;

        if (paginas[paginaActual].tipo === "explosionOscura" && !explosionRealizada) {
          activarExplosionOscura();
          return;
        }

        mensaje.textContent = "¡Agitado!";
        objetos.forEach(p => {
          p.vx += (Math.random() - 0.5) * 24;
          p.vy += (Math.random() - 0.5) * 24;
        });
        reproducir("pop");
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
      }
    });

    async function pedirPermisos() {
      try {
        if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
          await DeviceMotionEvent.requestPermission();
        }
        if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
          await DeviceOrientationEvent.requestPermission();
        }
      } catch (error) {
        console.log("Permisos de sensores no concedidos", error);
      }

      iniciarAudio();
      reproducir("pop");
      await activarMicrofono();

      sensoresActivos = true;
      panelInicio.style.display = "none";
      cargarPagina(0);
      animar();
    }

    function activarExplosionOscura() {
      explosionRealizada = true;
      mensaje.textContent = "¡BOOM! La página se apagó.";
      reproducirExplosion();
      if (navigator.vibrate) navigator.vibrate([120, 60, 180, 80, 250]);

      objetos.forEach(p => {
        p.el.classList.add("explota");
        p.vx += (Math.random() - 0.5) * 38;
        p.vy += (Math.random() - 0.5) * 38;
      });

      nivelOscuridad = 1;
      capaOscura.style.opacity = 1;

      setTimeout(() => {
        capaPuntos.innerHTML = "";
        objetos = [];
        crearPunto("amarillo", 50, 50);
        objetos[0].el.style.opacity = "0";
        mensaje.textContent = "Desliza hacia arriba para iluminar la página.";
      }, 1200);
    }

    function reproducirExplosion() {
      if (!audioContext) return;

      const t = audioContext.currentTime;
      const duracion = 0.75;
      const bufferSize = audioContext.sampleRate * duracion;
      const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        const fade = 1 - i / bufferSize;
        data[i] = (Math.random() * 2 - 1) * Math.pow(fade, 2.5);
      }

      const ruido = audioContext.createBufferSource();
      ruido.buffer = buffer;

      const filtro = audioContext.createBiquadFilter();
      filtro.type = "lowpass";
      filtro.frequency.setValueAtTime(900, t);
      filtro.frequency.exponentialRampToValueAtTime(90, t + duracion);

      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duracion);

      ruido.connect(filtro);
      filtro.connect(gain);
      gain.connect(audioContext.destination);

      ruido.start(t);
      ruido.stop(t + duracion);
    }

    function iluminarEscena(cantidad) {
      if (paginas[paginaActual].tipo !== "explosionOscura") return;
      if (!explosionRealizada) return;

      nivelOscuridad = Math.max(0, nivelOscuridad - cantidad);
      capaOscura.style.opacity = nivelOscuridad;

      if (objetos[0]) {
        objetos[0].el.style.opacity = String(1 - nivelOscuridad);
      }

      if (nivelOscuridad <= 0.05) {
        nivelOscuridad = 0;
        capaOscura.style.opacity = 0;
        mensaje.textContent = "La luz volvió. Queda un puntito amarillo. Ahora sóplalo.";
      }
    }

    function apagarEscenaPorSoplo() {
      if (paginas[paginaActual].tipo !== "explosionOscura") return false;
      if (!explosionRealizada) return false;
      if (nivelOscuridad > 0.1) return false;

      nivelOscuridad = 1;
      capaOscura.style.opacity = 1;
      mensaje.textContent = "Soplaste... y apagaste la página.";
      if (objetos[0]) objetos[0].el.style.opacity = "0";
      if (navigator.vibrate) navigator.vibrate([60, 40, 120]);
      return true;
    }

    window.addEventListener("pointerdown", e => {
      inicioToqueY = e.clientY;
    });

    window.addEventListener("pointermove", e => {
      if (inicioToqueY === null) return;
      const diferencia = inicioToqueY - e.clientY;
      if (diferencia > 8) {
        iluminarEscena(diferencia / 900);
        inicioToqueY = e.clientY;
      }
    });

    window.addEventListener("pointerup", () => {
      inicioToqueY = null;
    });

    async function activarMicrofono() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const fuente = audioContext.createMediaStreamSource(stream);
        analizadorAudio = audioContext.createAnalyser();
        analizadorAudio.fftSize = 1024;
        datosAudio = new Uint8Array(analizadorAudio.frequencyBinCount);
        fuente.connect(analizadorAudio);
        microfonoActivo = true;
        detectarSoplo();
      } catch (error) {
        mensaje.textContent = "Micrófono no activado. Revisa permisos.";
        console.log("No se pudo activar el micrófono", error);
      }
    }

    function detectarSoplo() {
      if (!microfonoActivo || !analizadorAudio) return;

      analizadorAudio.getByteFrequencyData(datosAudio);

      let volumen = 0;
      for (let i = 0; i < datosAudio.length; i++) {
        volumen += datosAudio[i];
      }
      volumen = volumen / datosAudio.length;

      const ahora = Date.now();

      // Soplo: sonido sostenido de intensidad media/alta.
      // Puedes ajustar este número: 18 más sensible, 35 menos sensible.
      if (volumen > 24 && ahora - ultimoSoplo > 450) {
        ultimoSoplo = ahora;

        if (apagarEscenaPorSoplo()) {
          requestAnimationFrame(detectarSoplo);
          return;
        }

        mensaje.textContent = "¡Soplo detectado!";

        objetos.forEach(p => {
          p.vx += (Math.random() - 0.5) * 4;
          p.vy -= 5;
        });

        // No reproducimos sonido en cada soplo para evitar ruido molesto.
        if (navigator.vibrate) navigator.vibrate(25);
      }

      // Soplo fuerte: pasa a la siguiente página, excepto en la escena de apagado.
      if (paginas[paginaActual].tipo !== "explosionOscura" && volumen > 42 && ahora - ultimoCambioPagina > TIEMPO_ENTRE_CAMBIO_PAGINA) {
        mensaje.textContent = "¡Soplo fuerte! Pasando página...";
        siguientePagina();
      }

      requestAnimationFrame(detectarSoplo);
    }

    btnIniciar.addEventListener("click", pedirPermisos);

    window.addEventListener("resize", () => cargarPagina(paginaActual));
  </script>
</body>
</html>
